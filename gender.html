<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cast Your Vote · Oh Baby!</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,400;1,700&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold:      #c9a96e;
            --boy:       #7ab8d8;
            --boy-deep:  #4a8cae;
            --boy-light: #d6eef8;
            --girl:      #e08aaa;
            --girl-deep: #c0547a;
            --girl-light:#fce4ed;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        /* ── Dynamic bg that shifts to boy/girl color ── */
        .bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(-45deg, #fde8f0, #fdf4e0, #e8f4fd, #f4e8fd, #fde8f0);
            background-size: 400% 400%;
            animation: bgShift 10s ease infinite;
            z-index: 0;
            transition: background 1.2s ease;
        }

        .bg.boy-bg  { background: linear-gradient(-45deg, #d6eef8, #e8f4fd, #c8e4f4, #ddf0f8, #d6eef8); }
        .bg.girl-bg { background: linear-gradient(-45deg, #fce4ed, #fdeef4, #f8d4e4, #fde8f0, #fce4ed); }

        @keyframes bgShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #bgCanvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        #confettiCanvas {
            position: fixed;
            inset: 0;
            z-index: 12;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 390px;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 40px;
            padding: 36px 26px 42px;
            border: 1.5px solid rgba(255,255,255,0.95);
            box-shadow:
                0 4px 24px rgba(200,160,100,0.1),
                0 20px 60px rgba(180,140,160,0.18),
                inset 0 1px 0 rgba(255,255,255,1);
            animation: cardIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
            text-align: center;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(48px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .question-icon {
            font-size: 2.6rem;
            display: block;
            margin-bottom: 4px;
            animation: spin 6s linear infinite;
        }

        @keyframes spin {
            0%   { transform: rotate(-8deg) scale(1); }
            25%  { transform: rotate(8deg) scale(1.05); }
            50%  { transform: rotate(-4deg) scale(1); }
            75%  { transform: rotate(6deg) scale(1.04); }
            100% { transform: rotate(-8deg) scale(1); }
        }

        .script {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            color: var(--gold);
            font-size: 1.05rem;
            margin-bottom: 2px;
        }

        h1 {
            font-size: 2.1rem;
            font-weight: 700;
            color: #3a2a2a;
            letter-spacing: -1px;
            margin-bottom: 4px;
            line-height: 1.1;
        }

        .greeting {
            font-size: 0.8rem;
            color: #b89898;
            font-weight: 500;
            margin-bottom: 26px;
        }

        .greeting strong {
            color: var(--gold);
            font-weight: 700;
        }

        /* ── Gender Cards ── */
        .vote-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 22px;
        }

        .gender-card {
            position: relative;
            cursor: pointer;
            border-radius: 28px;
            border: 2px solid rgba(220,200,210,0.5);
            background: rgba(255,255,255,0.85);
            padding: 30px 10px 24px;
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Shimmer overlay */
        .gender-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 26px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .gender-card.boy::before  { background: radial-gradient(ellipse at 50% 0%, var(--boy-light) 0%, transparent 70%); }
        .gender-card.girl::before { background: radial-gradient(ellipse at 50% 0%, var(--girl-light) 0%, transparent 70%); }

        /* Sparkle top-right */
        .gender-card::after {
            content: '✨';
            position: absolute;
            top: 8px; right: 10px;
            font-size: 0.85rem;
            opacity: 0;
            transform: scale(0) rotate(-20deg);
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
        }

        .gender-card:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 14px 36px rgba(0,0,0,0.1);
        }

        .gender-card.boy:hover  { border-color: rgba(122,184,216,0.6); }
        .gender-card.girl:hover { border-color: rgba(224,138,170,0.6); }

        /* Selected */
        .gender-card.selected {
            transform: scale(0.95) translateY(-2px);
            border-width: 2.5px;
        }

        .gender-card.boy.selected {
            border-color: var(--boy-deep);
            background: var(--boy-light);
            box-shadow: 0 0 0 5px rgba(122,184,216,0.2), 0 10px 30px rgba(74,140,174,0.25);
        }

        .gender-card.girl.selected {
            border-color: var(--girl-deep);
            background: var(--girl-light);
            box-shadow: 0 0 0 5px rgba(224,138,170,0.2), 0 10px 30px rgba(192,84,122,0.25);
        }

        .gender-card.selected::before { opacity: 1; }

        .gender-card.selected::after {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        /* Dimmed */
        .gender-card.dimmed {
            opacity: 0.38;
            transform: scale(0.94);
            filter: grayscale(0.4) blur(0.5px);
        }

        /* Card emoji */
        .card-emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }

        .gender-card.selected .card-emoji { animation: emojiPop 0.5s ease; }

        @keyframes emojiPop {
            0%   { transform: scale(1); }
            30%  { transform: scale(1.4) rotate(-10deg); }
            60%  { transform: scale(1.2) rotate(6deg); }
            100% { transform: scale(1.15) rotate(-4deg); }
        }

        .card-label {
            font-weight: 700;
            font-size: 0.88rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #bba8a8;
            position: relative;
            z-index: 1;
            transition: color 0.3s;
        }

        .gender-card.boy.selected  .card-label { color: var(--boy-deep); }
        .gender-card.girl.selected .card-label { color: var(--girl-deep); }

        /* Ripple inside cards on click */
        .card-ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s ease-out;
            pointer-events: none;
        }

        .boy  .card-ripple { background: rgba(122,184,216,0.35); }
        .girl .card-ripple { background: rgba(224,138,170,0.35); }

        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }

        /* ── Pulse ring on selected card ── */
        .pulse-ring {
            position: absolute;
            inset: -4px;
            border-radius: 32px;
            border: 2px solid transparent;
            opacity: 0;
            pointer-events: none;
        }

        .gender-card.boy.selected  .pulse-ring { border-color: var(--boy); animation: pulseRing 1.8s ease-out infinite; }
        .gender-card.girl.selected .pulse-ring { border-color: var(--girl); animation: pulseRing 1.8s ease-out infinite; }

        @keyframes pulseRing {
            0%   { opacity: 0.7; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.14); }
        }

        /* ── Submit button ── */
        .submit-btn {
            width: 100%;
            height: 58px;
            border: none;
            border-radius: 29px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
            background: #e0d8d0;
            color: #b0a098;
            pointer-events: none;
        }

        .submit-btn.ready { pointer-events: all; color: #fff; }

        .submit-btn.boy-ready {
            background: linear-gradient(135deg, var(--boy), var(--boy-deep), #82c4e0);
            background-size: 200% 200%;
            box-shadow: 0 6px 24px rgba(122,184,216,0.5);
            animation: btnShimmer 3s ease infinite;
        }

        .submit-btn.girl-ready {
            background: linear-gradient(135deg, var(--girl), var(--girl-deep), #e8a0be);
            background-size: 200% 200%;
            box-shadow: 0 6px 24px rgba(224,138,170,0.5);
            animation: btnShimmer 3s ease infinite;
        }

        @keyframes btnShimmer {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }

        .submit-btn.ready::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmerSlide 2.5s ease infinite;
        }

        @keyframes shimmerSlide {
            0%       { left: -100%; }
            50%, 100%{ left: 150%; }
        }

        .submit-btn.ready:hover  { transform: translateY(-2px) scale(1.02); }
        .submit-btn.ready:active { transform: scale(0.97); }

        /* ── Submitting overlay ── */
        #submitOverlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 20;
            background: rgba(253,248,242,0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        #submitOverlay.show { display: flex; }

        .overlay-emoji {
            font-size: 4.5rem;
            animation: overlayBounce 0.7s ease-in-out infinite alternate;
        }

        @keyframes overlayBounce {
            from { transform: scale(1) translateY(0); }
            to   { transform: scale(1.15) translateY(-8px); }
        }

        .overlay-text {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-size: 1.5rem;
            color: var(--gold);
        }

        .overlay-sub {
            font-size: 0.8rem;
            color: #c0a8b0;
            letter-spacing: 0.5px;
        }

        iframe { display: none; }
    </style>
</head>
<body>

<div class="bg" id="mainBg"></div>
<canvas id="bgCanvas"></canvas>
<canvas id="confettiCanvas"></canvas>

<div class="container">
    <div class="card">
        <span class="question-icon">🤔</span>
        <div class="script">Now for the big question...</div>
        <h1>Boy or Girl? 💭</h1>
        <p class="greeting">Hey <strong id="guestName">there</strong>, what's your gut feeling?</p>

        <div class="vote-grid">
            <div class="gender-card boy" id="boyCard" onclick="selectGender('Boy', event)">
                <div class="pulse-ring"></div>
                <span class="card-emoji">💙</span>
                <span class="card-label">Boy</span>
            </div>
            <div class="gender-card girl" id="girlCard" onclick="selectGender('Girl', event)">
                <div class="pulse-ring"></div>
                <span class="card-emoji">💗</span>
                <span class="card-label">Girl</span>
            </div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="castVote(event)">
            TAP A CARD TO VOTE
        </button>
    </div>
</div>

<div id="submitOverlay">
    <div class="overlay-emoji" id="overlayEmoji">✨</div>
    <div class="overlay-text" id="overlayText">Casting your vote...</div>
    <div class="overlay-sub">Hold tight, almost there!</div>
</div>

<iframe name="hidden_iframe" id="hidden_iframe"
    onload="if(formSubmitted) redirectToResult()"></iframe>

<script>
    /* ── Params ── */
    const params    = new URLSearchParams(window.location.search);
    const guestName = params.get('name')     || '';
    const relation  = params.get('relation') || '';
    let selected    = null;
    let formSubmitted = false;

    if (guestName) document.getElementById('guestName').textContent = guestName.split(' ')[0];

    /* ── Select gender ── */
    function selectGender(gender, e) {
        selected = gender;

        const boyCard  = document.getElementById('boyCard');
        const girlCard = document.getElementById('girlCard');
        const btn      = document.getElementById('submitBtn');
        const bg       = document.getElementById('mainBg');

        boyCard.classList.remove('selected','dimmed');
        girlCard.classList.remove('selected','dimmed');
        bg.className = 'bg';

        /* Ripple */
        const card = gender === 'Boy' ? boyCard : girlCard;
        addRipple(card, e);

        if (gender === 'Boy') {
            boyCard.classList.add('selected');
            girlCard.classList.add('dimmed');
            bg.classList.add('boy-bg');
            btn.className = 'submit-btn ready boy-ready';
            btn.textContent = 'CAST MY VOTE — BOY 💙';
            miniConfetti(['#7ab8d8','#d6eef8','#4a8cae','#b8ddf0']);
            updateFloaterColor('boy');
        } else {
            girlCard.classList.add('selected');
            boyCard.classList.add('dimmed');
            bg.classList.add('girl-bg');
            btn.className = 'submit-btn ready girl-ready';
            btn.textContent = 'CAST MY VOTE — GIRL 💗';
            miniConfetti(['#e08aaa','#fce4ed','#c0547a','#f0b8cc']);
            updateFloaterColor('girl');
        }
    }

    function addRipple(card, e) {
        if (!e) return;
        const rect   = card.getBoundingClientRect();
        const ripple = document.createElement('div');
        ripple.className = 'card-ripple';
        const size   = Math.max(card.offsetWidth, card.offsetHeight);
        ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px;`;
        card.appendChild(ripple);
        setTimeout(() => ripple.remove(), 650);
    }

    /* ── Cast vote ── */
    function castVote(e) {
        if (!selected) return;
        const overlay = document.getElementById('submitOverlay');
        document.getElementById('overlayEmoji').textContent = selected === 'Boy' ? '💙' : '💗';
        document.getElementById('overlayText').textContent  = selected === 'Boy' ? 'Sending your vote...' : 'Sending your vote...';
        overlay.classList.add('show');
        bigConfetti(selected === 'Boy' ? '#7ab8d8' : '#e08aaa');
        setTimeout(submitGoogleForm, 700);
    }

    /* ── Google Form ── */
    function submitGoogleForm() {
        formSubmitted = true;
        const form = document.createElement('form');
        form.action = 'https://docs.google.com/forms/d/e/1FAIpQLSdJAMN7ilc3MtzJvxhxbs8L8psToy6cZKEpPsxEtx0m88eAtQ/formResponse';
        form.method = 'POST';
        form.target = 'hidden_iframe';
        [
            ['entry.1726790901', guestName],
            ['entry.522986527',  relation],
            ['entry.1379457699', selected]
        ].forEach(([name, value]) => {
            const inp = document.createElement('input');
            inp.type = 'hidden'; inp.name = name; inp.value = value;
            form.appendChild(inp);
        });
        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);
        setTimeout(redirectToResult, 4200);
    }

    function redirectToResult() { window.location.href = 'result.html'; }

    /* ── Background canvas ── */
    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx    = bgCanvas.getContext('2d');

    function resize() {
        bgCanvas.width  = window.innerWidth;
        bgCanvas.height = window.innerHeight;
        confCanvas.width  = window.innerWidth;
        confCanvas.height = window.innerHeight;
    }

    const EMOJIS_NEUTRAL = ['💕','⭐','🌸','✨','💫','🌷','💝','🌼','🎀','🌺'];
    const EMOJIS_BOY     = ['💙','⭐','🌊','✨','💫','🚀','🌀','🔵','⚡','🌟'];
    const EMOJIS_GIRL    = ['💗','⭐','🌸','✨','💫','🌷','💝','🦋','🎀','🌺'];

    const floaters = Array.from({ length: 22 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        e: EMOJIS_NEUTRAL[Math.floor(Math.random() * EMOJIS_NEUTRAL.length)],
        size: Math.random() * 13 + 9,
        vx: (Math.random() - 0.5) * 0.3,
        vy: -(Math.random() * 0.45 + 0.15),
        a: Math.random() * 0.42 + 0.15,
        wobble: Math.random() * Math.PI * 2,
        ws: Math.random() * 0.015 + 0.005,
        spin: (Math.random() - 0.5) * 0.018,
        ang: Math.random() * Math.PI * 2
    }));

    const bubbles = Array.from({ length: 14 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 28 + 6,
        vx: (Math.random() - 0.5) * 0.18,
        vy: -(Math.random() * 0.28 + 0.08),
        hue: [340,210,280,30][Math.floor(Math.random() * 4)],
        a: Math.random() * 0.09 + 0.03
    }));

    function updateFloaterColor(type) {
        const pool = type === 'boy' ? EMOJIS_BOY : EMOJIS_GIRL;
        floaters.forEach((f,i) => { if (i % 2 === 0) f.e = pool[Math.floor(Math.random() * pool.length)]; });
        bubbles.forEach(b => { b.hue = type === 'boy' ? 200 : 340; });
    }

    function wrap(obj) {
        const w = bgCanvas.width, h = bgCanvas.height;
        if (obj.y < -50)    obj.y = h + 50;
        if (obj.y > h + 50) obj.y = -50;
        if (obj.x < -50)    obj.x = w + 50;
        if (obj.x > w + 50) obj.x = -50;
    }

    function drawBg() {
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

        bubbles.forEach(b => {
            b.x += b.vx; b.y += b.vy; wrap(b);
            bgCtx.beginPath();
            bgCtx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            bgCtx.strokeStyle = `hsla(${b.hue},55%,72%,${b.a * 2.5})`;
            bgCtx.lineWidth = 1;
            bgCtx.stroke();
            const g = bgCtx.createRadialGradient(b.x - b.r*0.3, b.y - b.r*0.3, 0, b.x, b.y, b.r);
            g.addColorStop(0, `hsla(${b.hue},70%,92%,${b.a})`);
            g.addColorStop(1, `hsla(${b.hue},50%,82%,0)`);
            bgCtx.fillStyle = g;
            bgCtx.fill();
        });

        floaters.forEach(f => {
            f.wobble += f.ws; f.ang += f.spin;
            f.x += f.vx + Math.sin(f.wobble) * 0.28;
            f.y += f.vy;
            wrap(f);
            bgCtx.save();
            bgCtx.globalAlpha = f.a;
            bgCtx.translate(f.x, f.y);
            bgCtx.rotate(f.ang);
            bgCtx.font = `${f.size}px serif`;
            bgCtx.textAlign = 'center';
            bgCtx.textBaseline = 'middle';
            bgCtx.fillText(f.e, 0, 0);
            bgCtx.restore();
        });

        requestAnimationFrame(drawBg);
    }

    /* ── Confetti ── */
    const confCanvas = document.getElementById('confettiCanvas');
    const confCtx    = confCanvas.getContext('2d');

    function miniConfetti(colors) {
        confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
        const pieces = Array.from({ length: 50 }, () => ({
            x: Math.random() * confCanvas.width,
            y: confCanvas.height + 10,
            r: Math.random() * 6 + 3,
            c: colors[Math.floor(Math.random() * colors.length)],
            vy: -(Math.random() * 3.5 + 1.5),
            vx: (Math.random() - 0.5) * 2,
            wobble: Math.random() * Math.PI * 2,
            ws: Math.random() * 0.06 + 0.02,
            a: 1
        }));
        let frame = 0;
        const max = 70;
        function draw() {
            confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
            pieces.forEach(p => {
                p.wobble += p.ws;
                p.x += p.vx + Math.sin(p.wobble) * 0.5;
                p.y += p.vy;
                p.a = Math.max(0, 1 - frame / max);
                confCtx.beginPath();
                confCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                confCtx.fillStyle = p.c + Math.floor(p.a * 255).toString(16).padStart(2, '0');
                confCtx.fill();
            });
            frame++;
            if (frame < max) requestAnimationFrame(draw);
            else confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
        }
        draw();
    }

    function bigConfetti(mainColor) {
        const colors  = [mainColor, '#c9a96e', '#ffffff', mainColor + 'bb'];
        const SHAPES  = ['circle', 'rect', 'star'];
        const pieces  = Array.from({ length: 130 }, () => ({
            x: Math.random() * confCanvas.width,
            y: -20,
            r: Math.random() * 8 + 3,
            c: colors[Math.floor(Math.random() * colors.length)],
            vy: Math.random() * 4 + 2,
            vx: (Math.random() - 0.5) * 4,
            spin: (Math.random() - 0.5) * 0.15,
            ang: Math.random() * Math.PI * 2,
            shape: SHAPES[Math.floor(Math.random() * SHAPES.length)],
            a: 1
        }));
        let frame = 0;
        const max = 180;

        function drawStar(ctx, cx, cy, r, ang) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(ang);
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const a1 = (i * 4 * Math.PI / 5) - Math.PI / 2;
                const a2 = (i * 4 * Math.PI / 5 + 2 * Math.PI / 5) - Math.PI / 2;
                if (i === 0) ctx.moveTo(r * Math.cos(a1), r * Math.sin(a1));
                else ctx.lineTo(r * Math.cos(a1), r * Math.sin(a1));
                ctx.lineTo(r * 0.4 * Math.cos(a2), r * 0.4 * Math.sin(a2));
            }
            ctx.closePath();
            ctx.restore();
        }

        function draw() {
            confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
            pieces.forEach(p => {
                p.y += p.vy; p.x += p.vx; p.ang += p.spin;
                p.a = Math.max(0, 1 - Math.max(0, frame - max * 0.55) / (max * 0.45));
                confCtx.save();
                confCtx.globalAlpha = p.a;
                confCtx.fillStyle = p.c;
                if (p.shape === 'circle') {
                    confCtx.beginPath();
                    confCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    confCtx.fill();
                } else if (p.shape === 'rect') {
                    confCtx.translate(p.x, p.y);
                    confCtx.rotate(p.ang);
                    confCtx.fillRect(-p.r, -p.r * 0.5, p.r * 2, p.r);
                } else {
                    drawStar(confCtx, p.x, p.y, p.r * 1.4, p.ang);
                    confCtx.fill();
                }
                confCtx.restore();
            });
            frame++;
            if (frame < max) requestAnimationFrame(draw);
            else confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
        }
        draw();
    }

    /* ── Init ── */
    window.addEventListener('resize', resize);
    resize();
    drawBg();
</script>
</body>
</html>
