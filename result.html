<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thank You! • Oh Baby!</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,400;1,700&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold: #c9a96e;
            --pink: #e8b4c0;
            --blue: #a8cce0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        /* ── Animated gradient bg ── */
        .bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(-45deg, #fde8f0, #fdf4e0, #e8f4fd, #f4e8fd, #fde8f0);
            background-size: 400% 400%;
            animation: bgShift 10s ease infinite;
            z-index: 0;
        }

        @keyframes bgShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        #confettiCanvas { position: fixed; inset: 0; z-index: 12; pointer-events: none; }

        /* ── Card ── */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 370px;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 40px;
            padding: 40px 28px 44px;
            border: 1.5px solid rgba(255,255,255,0.95);
            box-shadow:
                0 4px 24px rgba(200,160,100,0.1),
                0 20px 60px rgba(180,140,160,0.18),
                inset 0 1px 0 rgba(255,255,255,1);
            text-align: center;
            animation: cardIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(48px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Photo ── */
        .photo-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 22px;
        }

        .photo-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: conic-gradient(
                #e8b4c0, #c9a96e, #a8cce0, #c9b4e8, #e8b4c0
            );
            background-size: 400% 400%;
            animation: ringRotate 4s linear infinite;
            z-index: 0;
        }

        @keyframes ringRotate {
            to { transform: rotate(360deg); }
        }

        .photo-ring-inner {
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            z-index: 1;
        }

        .parents-photo {
            position: relative;
            z-index: 2;
            width: 136px;
            height: 136px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.95);
            box-shadow: 0 4px 16px rgba(180,140,160,0.2);
            display: block;
            margin: 7px auto 0;
        }

        /* ── Text ── */
        .script {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            color: var(--gold);
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #3a2a2a;
            letter-spacing: -1px;
            margin-bottom: 8px;
            line-height: 1.1;
        }

        .tagline {
            font-size: 0.82rem;
            color: #b09090;
            line-height: 1.7;
            margin-bottom: 6px;
            padding: 0 6px;
        }

        .reveal-line {
            font-size: 0.82rem;
            font-weight: 700;
            color: #3a2a2a;
            letter-spacing: 0.5px;
            margin-bottom: 22px;
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(232,180,192,0.6), transparent);
        }
        .divider span { font-size: 1rem; }

        /* ── Emoji row ── */
        .emoji-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 22px;
        }

        .emoji-row span {
            font-size: 1.6rem;
            display: inline-block;
            animation: emojiBob var(--d, 2.4s) ease-in-out infinite;
            animation-delay: var(--delay, 0s);
        }

        @keyframes emojiBob {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50%       { transform: translateY(-6px) rotate(4deg); }
        }

        /* ── Heart beat icon ── */
        .heart-icon {
            font-size: 2.4rem;
            display: block;
            margin-bottom: 4px;
            animation: heartbeat 1.4s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            14%       { transform: scale(1.2); }
            28%       { transform: scale(1); }
            42%       { transform: scale(1.15); }
            70%       { transform: scale(1); }
        }

        /* ── Share / close button ── */
        .close-btn {
            width: 100%;
            height: 54px;
            background: linear-gradient(135deg, #d4a574 0%, #c9a96e 50%, #dbb87c 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 27px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 0.88rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(201,169,110,0.45);
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
            animation: btnShimmer 4s ease infinite;
        }

        @keyframes btnShimmer {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }

        .close-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmerSlide 3s ease infinite;
        }

        @keyframes shimmerSlide {
            0%        { left: -100%; }
            50%, 100% { left: 150%; }
        }

        .close-btn:hover  { transform: translateY(-2px) scale(1.02); box-shadow: 0 10px 30px rgba(201,169,110,0.55); }
        .close-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div class="bg"></div>
<canvas id="bgCanvas"></canvas>
<canvas id="confettiCanvas"></canvas>

<div class="container">
    <div class="card">

        <div class="photo-wrapper">
            <div class="photo-ring"></div>
            <div class="photo-ring-inner"></div>
            <!-- REPLACE src WITH YOUR PHOTO FILE -->
            <img src="Poojay.jpeg" alt="Parents" class="parents-photo">
        </div>

        <span class="heart-icon">💖</span>
        <div class="script">Thank you for playing!</div>
        <h1>Your guess is in!</h1>

        <div class="divider"><span>🌸</span></div>

        <p class="tagline">Whether it's bows or bowties, we are so excited to share this journey with you.</p>
        <p class="reveal-line">Stay tuned for the big reveal! 🎉</p>

        <div class="emoji-row">
            <span style="--d:2.2s; --delay:0s">✨</span>
            <span style="--d:2.5s; --delay:0.15s">🍼</span>
            <span style="--d:2.1s; --delay:0.3s">💗</span>
            <span style="--d:2.6s; --delay:0.45s">💙</span>
            <span style="--d:2.3s; --delay:0.6s">✨</span>
        </div>

        <button class="close-btn" onclick="launchConfetti()">CELEBRATE 🎊</button>

    </div>
</div>

<script>
    /* ── Background canvas ── */
    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx    = bgCanvas.getContext('2d');
    const confCanvas = document.getElementById('confettiCanvas');
    const confCtx    = confCanvas.getContext('2d');

    function resize() {
        bgCanvas.width    = window.innerWidth;
        bgCanvas.height   = window.innerHeight;
        confCanvas.width  = window.innerWidth;
        confCanvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const EMOJIS = ['💕','⭐','🌸','✨','💫','🌷','💝','🌼','🎀','🌺','🍼','💗','💙'];

    const floaters = Array.from({ length: 24 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        e: EMOJIS[Math.floor(Math.random() * EMOJIS.length)],
        size: Math.random() * 13 + 9,
        vx: (Math.random() - 0.5) * 0.3,
        vy: -(Math.random() * 0.45 + 0.15),
        a: Math.random() * 0.42 + 0.15,
        wobble: Math.random() * Math.PI * 2,
        ws: Math.random() * 0.015 + 0.005,
        spin: (Math.random() - 0.5) * 0.018,
        ang: Math.random() * Math.PI * 2
    }));

    const bubbles = Array.from({ length: 16 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 28 + 6,
        vx: (Math.random() - 0.5) * 0.18,
        vy: -(Math.random() * 0.28 + 0.08),
        hue: [340, 210, 280, 30][Math.floor(Math.random() * 4)],
        a: Math.random() * 0.09 + 0.03
    }));

    function wrap(obj) {
        const w = bgCanvas.width, h = bgCanvas.height;
        if (obj.y < -50)    obj.y = h + 50;
        if (obj.y > h + 50) obj.y = -50;
        if (obj.x < -50)    obj.x = w + 50;
        if (obj.x > w + 50) obj.x = -50;
    }

    function drawBg() {
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

        bubbles.forEach(b => {
            b.x += b.vx; b.y += b.vy; wrap(b);
            bgCtx.beginPath();
            bgCtx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            bgCtx.strokeStyle = `hsla(${b.hue},55%,72%,${b.a * 2.5})`;
            bgCtx.lineWidth = 1;
            bgCtx.stroke();
            const g = bgCtx.createRadialGradient(b.x - b.r*0.3, b.y - b.r*0.3, 0, b.x, b.y, b.r);
            g.addColorStop(0, `hsla(${b.hue},70%,92%,${b.a})`);
            g.addColorStop(1, `hsla(${b.hue},50%,82%,0)`);
            bgCtx.fillStyle = g;
            bgCtx.fill();
        });

        floaters.forEach(f => {
            f.wobble += f.ws; f.ang += f.spin;
            f.x += f.vx + Math.sin(f.wobble) * 0.28;
            f.y += f.vy;
            wrap(f);
            bgCtx.save();
            bgCtx.globalAlpha = f.a;
            bgCtx.translate(f.x, f.y);
            bgCtx.rotate(f.ang);
            bgCtx.font = `${f.size}px serif`;
            bgCtx.textAlign = 'center';
            bgCtx.textBaseline = 'middle';
            bgCtx.fillText(f.e, 0, 0);
            bgCtx.restore();
        });

        requestAnimationFrame(drawBg);
    }
    drawBg();

    /* ── Confetti burst on button ── */
    function launchConfetti() {
        const colors = ['#e08aaa','#7ab8d8','#c9a96e','#ffffff','#f0c0d0','#b8ddf0','#e8d4b8'];
        const SHAPES = ['circle','rect','star'];

        const pieces = Array.from({ length: 160 }, () => ({
            x: Math.random() * confCanvas.width,
            y: -20,
            r: Math.random() * 8 + 3,
            c: colors[Math.floor(Math.random() * colors.length)],
            vy: Math.random() * 4.5 + 2,
            vx: (Math.random() - 0.5) * 5,
            spin: (Math.random() - 0.5) * 0.16,
            ang: Math.random() * Math.PI * 2,
            shape: SHAPES[Math.floor(Math.random() * SHAPES.length)],
            a: 1
        }));

        let frame = 0;
        const max = 200;

        function drawStar(ctx, cx, cy, r, ang) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(ang);
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const a1 = (i * 4 * Math.PI / 5) - Math.PI / 2;
                const a2 = (i * 4 * Math.PI / 5 + 2 * Math.PI / 5) - Math.PI / 2;
                if (i === 0) ctx.moveTo(r * Math.cos(a1), r * Math.sin(a1));
                else ctx.lineTo(r * Math.cos(a1), r * Math.sin(a1));
                ctx.lineTo(r * 0.4 * Math.cos(a2), r * 0.4 * Math.sin(a2));
            }
            ctx.closePath();
            ctx.restore();
        }

        function draw() {
            confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
            pieces.forEach(p => {
                p.y += p.vy; p.x += p.vx; p.ang += p.spin;
                p.vy += 0.06; /* gentle gravity */
                p.a = Math.max(0, 1 - Math.max(0, frame - max * 0.6) / (max * 0.4));
                confCtx.save();
                confCtx.globalAlpha = p.a;
                confCtx.fillStyle = p.c;
                if (p.shape === 'circle') {
                    confCtx.beginPath();
                    confCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    confCtx.fill();
                } else if (p.shape === 'rect') {
                    confCtx.translate(p.x, p.y);
                    confCtx.rotate(p.ang);
                    confCtx.fillRect(-p.r, -p.r * 0.5, p.r * 2, p.r);
                } else {
                    drawStar(confCtx, p.x, p.y, p.r * 1.4, p.ang);
                    confCtx.fill();
                }
                confCtx.restore();
            });
            frame++;
            if (frame < max) requestAnimationFrame(draw);
            else confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
        }
        draw();
    }

    /* Auto-launch confetti on page load */
    setTimeout(launchConfetti, 600);
</script>
</body>
</html>
