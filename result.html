<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You! • Oh Baby</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,400;1,700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; font-family: 'Poppins', sans-serif; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #fdfaf6 url('https://img.freepik.com/free-vector/hand-painted-watercolor-floral-background_23-2148434057.jpg') center/cover fixed;
        }
        .card {
            background: rgba(255, 255, 255, 0.95); padding: 40px 20px;
            border-radius: 40px; text-align: center; max-width: 350px; width: 90%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid white;
        }
        .parents-photo {
            width: 150px; height: 150px; border-radius: 50%; object-fit: cover;
            border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .script { font-family: 'Bodoni Moda', serif; font-style: italic; color: #bfa071; font-size: 1.2rem; }
        h1 { font-size: 1.8rem; margin: 10px 0; color: #333; }
        p { color: #777; line-height: 1.5; font-size: 0.9rem; }
        .confetti { font-size: 2rem; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <!-- REPLACE THIS LINK WITH A PHOTO OF THE PARENTS -->
        <img src="Poojay.jpeg" alt="Parents" class="parents-photo">
        
        <div class="script">Thank you for playing!</div>
        <h1>Your guess is in!</h1>
        <p>Whether it's bows or bowties, we are so excited to share this journey with you.</p>
        <p><strong>Stay tuned for the big reveal!</strong></p>
        <span class="confetti">✨🍼💗💙✨</span>
    </div>
</body>
</html>
