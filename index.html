<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baby Prediction Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,400;1,700&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold: #c9a96e;
            --pink: #e8b4c0;
            --blue: #a8cce0;
            --cream: #fdf8f2;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        .bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(-45deg, #fde8f0, #fdf4e0, #e8f4fd, #f4e8fd, #fde8f0);
            background-size: 400% 400%;
            animation: bgShift 10s ease infinite;
            z-index: 0;
        }

        @keyframes bgShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #bgCanvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 380px;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 40px;
            padding: 40px 28px 44px;
            border: 1.5px solid rgba(255,255,255,0.95);
            box-shadow:
                0 4px 24px rgba(200,160,100,0.1),
                0 20px 60px rgba(180,140,160,0.18),
                inset 0 1px 0 rgba(255,255,255,1);
            animation: cardIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
            text-align: center;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(48px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .baby-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 4px;
            animation: bobble 3s ease-in-out infinite;
        }

        @keyframes bobble {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50%       { transform: translateY(-7px) rotate(4deg); }
        }

        .script {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            color: var(--gold);
            font-size: 1.05rem;
            margin-bottom: 2px;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #3a2a2a;
            letter-spacing: -1.5px;
            margin-bottom: 4px;
            line-height: 1;
        }

        .subtitle {
            font-size: 0.78rem;
            color: #c0a8b0;
            font-weight: 500;
            margin-bottom: 26px;
            letter-spacing: 0.5px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(232,180,192,0.6), transparent);
        }
        .divider span { font-size: 1rem; }

        .input-group { margin-bottom: 14px; text-align: left; }

        label.field-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #c8a8b4;
            text-transform: uppercase;
            margin-left: 14px;
            margin-bottom: 7px;
            display: block;
        }

        input[type="text"], select {
            width: 100%;
            height: 54px;
            padding: 0 20px;
            border: 1.5px solid rgba(232,180,192,0.5);
            border-radius: 18px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            background: rgba(255,255,255,0.8);
            color: #3a2a2a;
            appearance: none;
            -webkit-appearance: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(201,169,110,0.13);
            background: #fff;
        }

        input.error, select.error {
            border-color: #e8a0a0;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-6px); }
            75%       { transform: translateX(6px); }
        }

        .submit-btn {
            width: 100%;
            height: 58px;
            background: linear-gradient(135deg, #d4a574 0%, #c9a96e 50%, #dbb87c 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 29px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 6px 24px rgba(201,169,110,0.45), 0 2px 4px rgba(0,0,0,0.08);
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
            animation: btnShimmer 4s ease infinite;
        }

        @keyframes btnShimmer {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmerSlide 3s ease infinite;
        }

        @keyframes shimmerSlide {
            0%   { left: -100%; }
            50%, 100% { left: 150%; }
        }

        .submit-btn:hover  { transform: translateY(-2px) scale(1.02); box-shadow: 0 12px 32px rgba(201,169,110,0.55); }
        .submit-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div class="bg"></div>
<canvas id="bgCanvas"></canvas>

<div class="container">
    <div class="card">
        <span class="baby-icon">🍼</span>
        <div class="script">Welcome to the...</div>
        <h1>Gender Vote!</h1>
        <p class="subtitle">Cast your gender prediction ✨</p>

        <div class="divider"><span>🌸</span></div>

        <div class="input-group">
            <label class="field-label">Your Name</label>
            <input type="text" id="nameInput" placeholder="Enter your name" autocomplete="off">
        </div>

        <div class="input-group">
            <label class="field-label">Your Relation to the Baby</label>
            <select id="relationInput">
                <option value="" disabled selected>Select your relationship...</option>
                <option value="Grandmother">Grandmother</option>
                <option value="Grandfather">Grandfather</option>
                <option value="Uncle">Uncle</option>
                <option value="Aunt">Aunt</option>
                <option value="Brother/ Bava">Brother/ Bava</option>
                <option value="Sister/ Vadhina">Sister/ Vadhina</option>
                <option value="Great Grandfather">Great Grandfather</option>
                <option value="Great Grandmother">Great Grandmother</option>
                <option value="Mom">Mom</option>
                <option value="Dad">Dad</option>
            </select>
        </div>

        <button class="submit-btn" onclick="goToGender()">CONTINUE ✨</button>
    </div>
</div>

<script>
    function goToGender() {
        const name     = document.getElementById('nameInput').value.trim();
        const relation = document.getElementById('relationInput').value;
        let valid = true;
        ['nameInput','relationInput'].forEach(id => document.getElementById(id).classList.remove('error'));
        if (!name)     { document.getElementById('nameInput').classList.add('error');     valid = false; }
        if (!relation) { document.getElementById('relationInput').classList.add('error'); valid = false; }
        if (!valid) return;
        window.location.href = 'gender.html?' + new URLSearchParams({ name, relation });
    }

    /* ── Background canvas animation ── */
    const canvas = document.getElementById('bgCanvas');
    const ctx    = canvas.getContext('2d');

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const EMOJIS = ['💕','⭐','🌸','✨','💫','🌷','💝','🌼','🎀','🌺'];

    const floaters = Array.from({ length: 24 }, () => ({
        x:    Math.random() * window.innerWidth,
        y:    Math.random() * window.innerHeight,
        e:    EMOJIS[Math.floor(Math.random() * EMOJIS.length)],
        size: Math.random() * 13 + 9,
        vx:   (Math.random() - 0.5) * 0.3,
        vy:   -(Math.random() * 0.45 + 0.15),
        a:    Math.random() * 0.45 + 0.15,
        wobble: Math.random() * Math.PI * 2,
        ws:   Math.random() * 0.015 + 0.005,
        spin: (Math.random() - 0.5) * 0.018,
        ang:  Math.random() * Math.PI * 2
    }));

    const bubbles = Array.from({ length: 16 }, () => ({
        x:   Math.random() * window.innerWidth,
        y:   Math.random() * window.innerHeight,
        r:   Math.random() * 30 + 6,
        vx:  (Math.random() - 0.5) * 0.18,
        vy:  -(Math.random() * 0.28 + 0.08),
        hue: [340, 210, 280, 30][Math.floor(Math.random() * 4)],
        a:   Math.random() * 0.1 + 0.03
    }));

    function wrap(obj) {
        const w = canvas.width, h = canvas.height;
        if (obj.y < -50)   obj.y = h + 50;
        if (obj.y > h + 50) obj.y = -50;
        if (obj.x < -50)   obj.x = w + 50;
        if (obj.x > w + 50) obj.x = -50;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        bubbles.forEach(b => {
            b.x += b.vx; b.y += b.vy; wrap(b);
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.strokeStyle = `hsla(${b.hue},55%,72%,${b.a * 2.5})`;
            ctx.lineWidth = 1;
            ctx.stroke();
            const g = ctx.createRadialGradient(b.x - b.r*0.3, b.y - b.r*0.3, 0, b.x, b.y, b.r);
            g.addColorStop(0, `hsla(${b.hue},70%,92%,${b.a})`);
            g.addColorStop(1, `hsla(${b.hue},50%,82%,0)`);
            ctx.fillStyle = g;
            ctx.fill();
        });

        floaters.forEach(f => {
            f.wobble += f.ws;
            f.ang += f.spin;
            f.x += f.vx + Math.sin(f.wobble) * 0.28;
            f.y += f.vy;
            wrap(f);
            ctx.save();
            ctx.globalAlpha = f.a;
            ctx.translate(f.x, f.y);
            ctx.rotate(f.ang);
            ctx.font = `${f.size}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(f.e, 0, 0);
            ctx.restore();
        });

        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
