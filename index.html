<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Prediction Game • Oh Baby!</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,400;1,700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-text: #4a4a4a;
            --boy-bg: #e1f1f8;
            --boy-text: #6c8ea1;
            --girl-bg: #fee6e9;
            --girl-text: #b1888c;
            --gold: #bfa071;
            --cream: #fcfbf6;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--cream);
            /* Soft watercolor floral background */
            background-image: url('https://www.transparenttextures.com/patterns/cream-pixels.png'), 
                              url('https://img.freepik.com/free-vector/hand-painted-watercolor-floral-background_23-2148434057.jpg');
            background-size: auto, cover;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            padding: 60px 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid white;
        }

        .script-title {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 5px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 30px 0;
            font-weight: 700;
            color: var(--primary-text);
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #888;
            margin-left: 10px;
            margin-bottom: 8px;
            display: block;
        }

        input[type="text"], select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #eee;
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--gold); outline: none; }

        .vote-container {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }

        .vote-card {
            flex: 1;
            position: relative;
            cursor: pointer;
        }

        .vote-card input { position: absolute; opacity: 0; }

        .vote-design {
            padding: 25px 10px;
            border: 2px solid #eee;
            border-radius: 25px;
            background: white;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .vote-design span { display: block; }
        .emoji { font-size: 2rem; margin-bottom: 10px; filter: grayscale(1); transition: 0.4s; }
        .label-text { font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }

        /* Selection States */
        input:checked + .vote-design.boy { background: var(--boy-bg); border-color: #b3d7e8; color: var(--boy-text); transform: scale(1.05); }
        input:checked + .vote-design.girl { background: var(--girl-bg); border-color: #f7cbd1; color: var(--girl-text); transform: scale(1.05); }
        input:checked + .vote-design .emoji { filter: grayscale(0); }

        .submit-btn {
            width: 100%;
            background: #4a4a4a;
            color: white;
            border: none;
            padding: 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .submit-btn:hover { background: var(--gold); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(191, 160, 113, 0.3); }
    </style>
</head>
<body>

<div class="form-card">
    <div class="script-title">Our Little One</div>
    <h1>Boy or Girl?</h1>
    
    <form action="https://docs.google.com/forms/d/e/1FAIpQLSd8XmtBGSjBohGKO7nwkA7UthDdb7e7eqBkCbyjBjs/formResponse" method="POST">
        
        <div class="input-group">
            <label>WHAT IS YOUR NAME?</label>
            <input type="text" name="entry.1471342629" placeholder="Enter name..." required>
        </div>

        <div class="input-group">
            <label>WHO ARE YOU TO THE BABY?</label>
            <select name="entry.1802958055" required>
                <option value="" disabled selected>Select relation...</option>
                <option value="Grandparent">Grandparent</option>
                <option value="Auntie/Uncle">Auntie/Uncle</option>
                <option value="Cousin">Cousin</option>
                <option value="Friend">Friend</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="vote-container">
            <label class="vote-card">
                <input type="radio" name="entry.1565576722" value="Boy" required>
                <div class="vote-design boy">
                    <span class="emoji">💙</span>
                    <span class="label-text">Team Boy</span>
                </div>
            </label>

            <label class="vote-card">
                <input type="radio" name="entry.1565576722" value="Girl" required>
                <div class="vote-design girl">
                    <span class="emoji">💗</span>
                    <span class="label-text">Team Girl</span>
                </div>
            </label>
        </div>

        <button type="submit" class="submit-btn">SEND MY GUESS ✨</button>
    </form>
</div>

</body>
</html>
