<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baby Prediction Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,400;1,700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #bfa071;
            --boy: #94b8cc;
            --girl: #d9a5b3;
            --cream: #fdfaf6;
            --glass: rgba(255, 255, 255, 0.9);
        }

        /* Prevent scrolling bounce on mobile */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: var(--cream);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-image: 
                url('https://www.transparenttextures.com/patterns/natural-paper.png'),
                url('https://img.freepik.com/free-vector/hand-painted-watercolor-floral-background_23-2148434057.jpg');
            background-size: auto, cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 25px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .script { font-family: 'Bodoni Moda', serif; font-style: italic; color: var(--gold); font-size: 1.2rem; }
        h1 { font-size: 2.2rem; margin: 5px 0 25px; font-weight: 700; color: #333; letter-spacing: -1px; }

        /* Mobile Optimized Inputs */
        .input-group { margin-bottom: 18px; text-align: left; }
        label { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; color: #999; margin-left: 10px; margin-bottom: 6px; display: block; text-transform: uppercase; }

        input[type="text"], select {
            width: 100%;
            height: 55px; /* Taller for mobile touch */
            padding: 0 20px;
            border: 1px solid #ddd;
            border-radius: 18px;
            font-family: 'Poppins', sans-serif;
            font-size: 16px; /* Prevents iOS auto-zoom on focus */
            background: #fff;
            appearance: none;
            box-sizing: border-box;
        }

        /* Custom Vote Grid */
        .vote-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 25px 0; }
        .vote-item { position: relative; cursor: pointer; }
        .vote-item input { position: absolute; opacity: 0; }

        .button-ui {
            padding: 20px 10px;
            border: 1px solid #eee;
            border-radius: 20px;
            background: #fff;
            transition: all 0.3s ease;
        }

        .emoji { font-size: 1.8rem; display: block; margin-bottom: 5px; }
        .btn-label { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; color: #888; }

        /* Selection Effects */
        input:checked + .button-ui.boy { background: #eef7ff; border-color: var(--boy); transform: scale(0.96); box-shadow: inset 0 0 10px rgba(148, 184, 204, 0.2); }
        input:checked + .button-ui.girl { background: #fff1f3; border-color: var(--girl); transform: scale(0.96); box-shadow: inset 0 0 10px rgba(217, 165, 179, 0.2); }
        input:checked + .button-ui .btn-label { color: #333; }

        .submit-btn {
            background: #333;
            color: white;
            border: none;
            height: 60px;
            width: 100%;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        .submit-btn:active { transform: scale(0.98); background: var(--gold); }

        /* Floating sparkles for flair */
        .sparkle {
            position: fixed;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: float 4s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="script">Guess the gender...</div>
        <h1>Oh Baby!</h1>
        <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {window.location='result.html';}"></iframe>
        <form id="genderForm" action="https://docs.google.com/forms/d/e/1FAIpQLSdJAMN7ilc3MtzJvxhxbs8L8psToy6cZKEpPsxEtx0m88eAtQ/formResponse" method="POST" target="hidden_iframe">
            
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" name="entry.1726790901" placeholder="Enter your name" required>
            </div>

            
                <div class="input-group">
    <label>What are you to the baby?</label>
    <select name="entry.522986527" required>
        <option value="" disabled selected>Select your relationship...</option>
        <option value="Grandmother">Grandmother</option>
        <option value="Grandfather">Grandfather</option>
        <option value="Uncle">Uncle</option>
        <option value="Aunt">Aunt</option>
        <option value="Brother/ Bava">Brother/ Bava</option>
        <option value="Sister/ Vadhina">Sister/ Vadhina</option>
        <option value="Great Grandfather">Great Grandfather</option>
        <option value="Great Grandmother">Great Grandmother</option>
        <option value="Mom">Mom</option>
        <option value="Dad">Dad</option>
    </select>
            </div>

            <div class="vote-grid">
                <label class="vote-item">
                    <input type="radio" name="entry.1379457699" value="Boy" required>
                    <div class="button-ui boy">
                        <span class="emoji">💙</span>
                        <span class="btn-label">Boy</span>
                    </div>
                </label>

                <label class="vote-item">
                    <input type="radio" name="entry.1379457699" value="Girl" required>
                    <div class="button-ui girl">
                        <span class="emoji">💗</span>
                        <span class="btn-label">Girl</span>
                    </div>
                </label>
            </div>

            <button type="submit" class="submit-btn">CAST MY VOTE ✨</button>
        </form>
    </div>
</div>

<script>
    // Create random floating sparkles for a high-end feel
    function createSparkles() {
        for (let i = 0; i < 12; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const size = Math.random() * 5 + 2 + 'px';
            sparkle.style.width = size;
            sparkle.style.height = size;
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.animationDuration = (Math.random() * 3 + 2) + 's';
            sparkle.style.animationDelay = (Math.random() * 4) + 's';
            document.body.appendChild(sparkle);
        }
    }
    createSparkles();
</script>
<script>
    var submitted = false;
    document.getElementById('genderForm').onsubmit = function() {
        submitted = true;
    };
</script>
</body>
</html>
